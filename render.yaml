services:
  - type: web
    name: frigate-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn run:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: RELOAD
        value: "false"
      - key: SQLITE_DB_PATH
        value: /var/data/metrics.db
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
    disk:
      name: frigate-backend-data
      mountPath: /var/data
      sizeGB: 1
