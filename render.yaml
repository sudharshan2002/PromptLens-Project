services:
  - type: web
    name: frigate-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt -r requirements-ml.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: RELOAD
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
